name: Unity Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: 6000.3.6f1
  PROJECT_PATH: .

jobs:
  validate:
    name: Validate (no Unity license required)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify project structure
        run: |
          set -e
          test -d Assets/_Project/Scripts || (echo "Missing Assets/_Project/Scripts" && exit 1)
          test -f ProjectSettings/ProjectVersion.txt || (echo "Missing ProjectVersion.txt" && exit 1)
          test -f Packages/manifest.json || (echo "Missing Packages/manifest.json" && exit 1)
          echo "✓ Project structure valid"

      - name: Verify Unity version pin
        run: |
          PINNED=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          echo "ProjectVersion.txt declares Unity $PINNED"
          echo "Workflow expects Unity $UNITY_VERSION"
          if [ "$PINNED" != "$UNITY_VERSION" ]; then
            echo "::warning::Unity version mismatch — update env.UNITY_VERSION in workflow if pin is intentional"
          fi

      - name: Verify .gitattributes has LFS rules
        run: |
          if ! grep -q "filter=lfs" .gitattributes; then
            echo "::error::.gitattributes missing LFS filter rules"
            exit 1
          fi
          echo "✓ LFS rules present"

      - name: Count C# files & lines
        run: |
          CS_COUNT=$(find Assets/_Project/Scripts -name "*.cs" 2>/dev/null | wc -l)
          CS_LINES=$(find Assets/_Project/Scripts -name "*.cs" -print0 2>/dev/null | xargs -0 cat 2>/dev/null | wc -l)
          echo "C# files in Assets/_Project/Scripts: $CS_COUNT"
          echo "Total lines: $CS_LINES"

      - name: Repo size sanity
        run: |
          du -sh .git 2>&1 || true
          du -sh Assets 2>&1 || true

  build:
    name: Build Win64 (requires Unity license secrets)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 60
    # Only run when license secrets are configured
    if: ${{ vars.HAS_UNITY_LICENSE == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-
            Library-${{ runner.os }}-

      - name: Build Win64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneWindows64
          buildName: TARTARIA
          allowDirtyBuild: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TARTARIA-Win64-${{ github.sha }}
          path: build/StandaloneWindows64
          retention-days: 7
          if-no-files-found: warn
